services:
  ollama:
    image: ollama/ollama:latest
    container_name: 51pogoda-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build: .
    image: 51pogoda:latest
    restart: unless-stopped
    # секреты и конфиг — из .env (НЕ коммитить; см. .env.example)
    env_file: .env
    # слушаем только локалхост — наружу отдаёт реверс-прокси с TLS
    # хост 5100 → контейнер 3000 (реверс-прокси проксирует на 127.0.0.1:5100)
    ports:
      - "127.0.0.1:5100:3000"
    # данные админки (кастомные точки, промпты) и счётчики аналитики — переживают редеплой
    volumes:
      - app-data:/app/data
    # --- харденинг ---
    # read_only НЕ ставим: Next 16 пишет prerender-кэш сегментов в .next/server/app,
    # а не только в .next/cache; на read-only это падает (ENOENT) и ломает ISR.
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    # ВАЖНО: ровно один инстанс. In-memory аналитика и анти-брутфорс логина
    # живут в одном процессе — горизонтальное масштабирование их сломает.
    environment:
      OLLAMA_URL: http://ollama:11434

volumes:
  app-data:
  ollama_data:
