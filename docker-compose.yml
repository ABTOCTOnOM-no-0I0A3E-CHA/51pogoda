services:
  web:
    build: .
    image: 51pogoda:latest
    restart: unless-stopped
    # секреты и конфиг — из .env (НЕ коммитить; см. .env.example)
    env_file: .env
    # хост 5100 → контейнер 3000
    ports:
      - "5100:3000"
    # данные админки (кастомные точки, промпты) и счётчики аналитики — переживают редеплой
    volumes:
      - app-data:/app/data
    # Open-Meteo прокси (и legacy сервисы) могут быть на хосте через host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # --- харденинг ---
    # read_only НЕ ставим: Next 16 пишет prerender-кэш сегментов в .next/server/app,
    # а не только в .next/cache; на read-only это падает (ENOENT) и ломает ISR.
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    # ВАЖНО: ровно один инстанс. In-memory аналитика и анти-брутфорс логина
    # живут в одном процессе — горизонтальное масштабирование их сломает.

volumes:
  app-data:
